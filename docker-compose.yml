services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${DB_NAME:-open_memory}
      POSTGRES_USER: ${DB_USER:-memory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-memory_user} -d ${DB_NAME:-open_memory} && psql -U ${DB_USER:-memory_user} -d ${DB_NAME:-open_memory} -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'vector'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memory-server:
    build:
      context: .
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
        ENABLE_GPU: ${ENABLE_GPU:-false}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-open_memory}
      DB_USER: ${DB_USER:-memory_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-256}
      DUAL_EMBEDDING: ${DUAL_EMBEDDING:-true}
      CODE_EMBEDDING_MODEL: ${CODE_EMBEDDING_MODEL:-nomic-ai/CodeRankEmbed}
      CODE_EMBEDDING_DIM: ${CODE_EMBEDDING_DIM:-768}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.85}
      ENABLE_GPU: ${ENABLE_GPU:-false}
      USER_MEMORY_TTL_DAYS: ${USER_MEMORY_TTL_DAYS:-0}
      PROJECT_MEMORY_TTL_DAYS: ${PROJECT_MEMORY_TTL_DAYS:-90}
      PROJECT_GUIDELINES_TTL_DAYS: ${PROJECT_GUIDELINES_TTL_DAYS:-0}
      AGENT_MEMORY_TTL_DAYS: ${AGENT_MEMORY_TTL_DAYS:-30}
      USER_MEMORY_CAP: ${USER_MEMORY_CAP:-500}
      PROJECT_MEMORY_CAP: ${PROJECT_MEMORY_CAP:-1000}
      PROJECT_GUIDELINES_CAP: ${PROJECT_GUIDELINES_CAP:-500}
      AGENT_MEMORY_CAP: ${AGENT_MEMORY_CAP:-500}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8080
      CLEANUP_INTERVAL_HOURS: ${CLEANUP_INTERVAL_HOURS:-24}
    ports:
      - "${MCP_PORT:-8080}:8080"
    stdin_open: true
    restart: unless-stopped

volumes:
  pgdata:
